services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8088:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8088/
    restart: unless-stopped
    # Optional: limit resources
    deploy:
      resources:
        limits:
          memory: 512M